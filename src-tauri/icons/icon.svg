<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="folderBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="folderTab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d4d4d8"/>
    </linearGradient>
  </defs>

  <!-- App background -->
  <rect width="512" height="512" rx="108" ry="108" fill="#09090b"/>

  <!-- Folder tab — smooth rounded flap -->
  <rect x="56" y="100" width="170" height="60" rx="18" fill="url(#folderTab)"/>

  <!-- Folder body — large, smooth, fills most of the icon -->
  <rect x="56" y="140" width="400" height="272" rx="28" fill="url(#folderBody)"/>

  <!-- Equalizer bars — white, bold -->
  <rect x="116" y="195" width="52" height="170" rx="14" fill="url(#bar)"/>
  <rect x="192" y="170" width="52" height="195" rx="14" fill="url(#bar)"/>
  <rect x="268" y="185" width="52" height="180" rx="14" fill="url(#bar)"/>
  <rect x="344" y="210" width="52" height="155" rx="14" fill="url(#bar)" opacity="0.85"/>
</svg>
